on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  create:
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

env:
  ZEPHYR_SDK_VERSION: "0.17.4"

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI
          submodules: recursive

      - name: 🧰 Cache + Install apt Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: 📦 Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: 🪁 Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ env.ZEPHYR_SDK_VERSION }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}/setup.sh -c -t arm-zephyr-eabi

      - name: 📦 Cache West Workspace
        id: cache-west
        uses: actions/cache@v4
        with:
          path: |
            zephyr-workspace/.west
            zephyr-workspace/zephyr
            zephyr-workspace/nrf
            zephyr-workspace/modules
            zephyr-workspace/nrfxlib
            zephyr-workspace/bootloader
            zephyr-workspace/tools
          key: west-workspace-${{ hashFiles('zephyr-workspace/SlimeNRF-CI/west.yml') }}

      - name: 📦 Cache Python venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: ~/.venv
          key: venv-${{ hashFiles('zephyr-workspace/SlimeNRF-CI/west.yml') }}

      - name: 🐍 Setup Python venv + West
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv ~/.venv
          ~/.venv/bin/pip install west ninja

      - name: ♻️ Initialize Zephyr Workspace
        run: |
          echo "$HOME/.venv/bin" >> $GITHUB_PATH
          export PATH="$HOME/.venv/bin:$PATH"
          cd zephyr-workspace
          if [ ! -d ".west" ]; then
            west init -l SlimeNRF-CI
          fi
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: 📦 Cache pip requirements
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.venv
          key: venv-pip-${{ hashFiles('zephyr-workspace/zephyr/scripts/requirements.txt') }}

      - name: 🐍 Install Zephyr Python Requirements
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          cd zephyr-workspace
          ~/.venv/bin/pip install -r zephyr/scripts/requirements.txt

  build:
    needs: setup
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        boards: [
                  {boardname: "nrf52840dongle/nrf52840", filename: "SlimeNRF_Nordic_eByte_Dongle_Receiver"},
                  {boardname: "holyiot_21017/nrf52840", filename: "SlimeNRF_Holyiot_Dongle_Receiver"},
                  {boardname: "promicro_uf2/nrf52840", filename: "SlimeNRF_ProMicro_Receiver"},
                  {boardname: "xiao_ble/nrf52840", filename: "SlimeNRF_XIAO_Receiver"},
                  {boardname: "etee_dongle_uf2/nrf52840", filename: "SlimeNRF_etee_Receiver"},
                  {boardname: "nrf52840dk/nrf52840", filename: "SlimeNRF_nRF52840dk_Receiver"},
                  {boardname: "styria_r1_uf2/nrf52840", filename: "SlimeNRF_Styria_R1_Receiver"},
                  {boardname: "aerorx_r1_uf2/nrf52840", filename: "SlimeNRF_AeroRX_R1_Receiver"},
                ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: zephyr-workspace/SlimeNRF-CI
          submodules: recursive

      - name: 🧰 Cache + Install apt Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: 📦 Restore Zephyr SDK
        uses: actions/cache/restore@v4
        with:
          path: ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          fail-on-cache-miss: true

      - name: 🪁 Register Zephyr SDK
        run: |
          ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}/setup.sh -c -t arm-zephyr-eabi

      - name: 📦 Restore West Workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            zephyr-workspace/.west
            zephyr-workspace/zephyr
            zephyr-workspace/nrf
            zephyr-workspace/modules
            zephyr-workspace/nrfxlib
            zephyr-workspace/bootloader
            zephyr-workspace/tools
          key: west-workspace-${{ hashFiles('zephyr-workspace/SlimeNRF-CI/west.yml') }}
          fail-on-cache-miss: true

      - name: 📦 Restore Python venv
        uses: actions/cache/restore@v4
        with:
          path: ~/.venv
          key: venv-pip-${{ hashFiles('zephyr-workspace/zephyr/scripts/requirements.txt') }}
          restore-keys: |
            venv-pip-
            venv-
          fail-on-cache-miss: true

      - name: ♻️ Register Zephyr Workspace
        run: |
          echo "$HOME/.venv/bin" >> $GITHUB_PATH
          export PATH="$HOME/.venv/bin:$PATH"
          cd zephyr-workspace
          west zephyr-export

      - name: 🔨 Build SlimeVR-Tracker-nRF-Receiver - ${{ matrix.boards.boardname }}
        if: always()
        run: |
          cd zephyr-workspace
          sudo rm -rf Releases
          mkdir -p Releases
          REPO_DIR="${{ github.event.repository.name }}"
          if [ ! -d "$REPO_DIR" ]; then
            echo "Repo dir not found: $REPO_DIR; fallback to SlimeNRF-CI"
            REPO_DIR="SlimeNRF-CI"
          fi
          rm -rf "$REPO_DIR/build"
          west build \
              --board ${{ matrix.boards.boardname }} \
              --pristine=always "$REPO_DIR" \
              --build-dir "$REPO_DIR/build" \
              -- \
              -DNCS_TOOLCHAIN_VERSION=NONE \
              -DBOARD_ROOT=../"$REPO_DIR"

          for ext in uf2 hex; do
            src="$REPO_DIR/build/$REPO_DIR/zephyr/zephyr.${ext}"
            dst="Releases/${{ matrix.boards.filename }}.${ext}"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
              echo "Saved: $dst"
            else
              echo "Not found (skip): $src"
            fi
          done

      - name: 💾 Upload Artifact - ${{ matrix.boards.boardname }}
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.boards.filename }}
          if-no-files-found: warn
          path: |
            zephyr-workspace/Releases/${{ matrix.boards.filename }}.uf2
            zephyr-workspace/Releases/${{ matrix.boards.filename }}.hex
